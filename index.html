<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Predict Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body { margin: 0; }
#map { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map').setView([51.262, 6.028], 14);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

L.circleMarker([51.2498819, 6.022837], {radius: 10, color: '#155724', fillColor: '#28a745', fillOpacity: 0.9, weight: 3}).addTo(map).bindPopup('Burcht 1');
L.circleMarker([51.255114, 6.02762], {radius: 10, color: '#155724', fillColor: '#28a745', fillOpacity: 0.9, weight: 3}).addTo(map).bindPopup('Burcht 2');
L.circleMarker([51.2569439, 6.0138429], {radius: 10, color: '#155724', fillColor: '#28a745', fillOpacity: 0.9, weight: 3}).addTo(map).bindPopup('Burcht 3');
L.circleMarker([51.275602, 6.0408319], {radius: 10, color: '#155724', fillColor: '#28a745', fillOpacity: 0.9, weight: 3}).addTo(map).bindPopup('Burcht 4');
L.circleMarker([51.2736279, 6.03221], {radius: 10, color: '#155724', fillColor: '#28a745', fillOpacity: 0.9, weight: 3}).addTo(map).bindPopup('Burcht 5');
</script>
</body>
</html>
